<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Drive Mount Simulator</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      align-items: center;
      background: #111;
      display: flex;
      justify-content: center;
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
    }
    img {
      background: #000;
      border: 1px solid #333;
      border-radius: 36px;
      box-shadow: 0 18px 60px #000b;
      height: min(96vh, 874px);
      object-fit: contain;
      width: auto;
    }
  </style>
</head>
<body>
  <img id="simulator" src="simulator-live.png" alt="Live iOS simulator">
  <script>
    const simulator = document.querySelector("#simulator");
    setInterval(() => {
      simulator.src = `simulator-live.png?t=${Date.now()}`;
    }, 750);
  </script>
</body>
</html>
