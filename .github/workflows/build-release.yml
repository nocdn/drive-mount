name: Build And Release Tauri Installers

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  metadata:
    runs-on: ubuntu-latest
    outputs:
      run_number: ${{ steps.metadata.outputs.run_number }}
      short_sha: ${{ steps.metadata.outputs.short_sha }}
      app_version: ${{ steps.metadata.outputs.app_version }}
      tag_name: ${{ steps.metadata.outputs.tag_name }}
      release_name: ${{ steps.metadata.outputs.release_name }}
      windows_msi_name: ${{ steps.metadata.outputs.windows_msi_name }}
      mac_arm64_dmg_name: ${{ steps.metadata.outputs.mac_arm64_dmg_name }}
      mac_x64_dmg_name: ${{ steps.metadata.outputs.mac_x64_dmg_name }}

    steps:
      - name: Compute build metadata
        id: metadata
        shell: bash
        run: |
          short_sha="${GITHUB_SHA::7}"
          app_version="0.1.${GITHUB_RUN_NUMBER}"
          tag_name="v$app_version"
          release_name="Cloud Drive Mount $app_version"
          windows_msi_name="CloudDriveMount-$app_version-windows-x64.msi"
          mac_arm64_dmg_name="CloudDriveMount-$app_version-macos-arm64.dmg"
          mac_x64_dmg_name="CloudDriveMount-$app_version-macos-x64.dmg"

          echo "run_number=${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "short_sha=$short_sha" >> "$GITHUB_OUTPUT"
          echo "app_version=$app_version" >> "$GITHUB_OUTPUT"
          echo "tag_name=$tag_name" >> "$GITHUB_OUTPUT"
          echo "release_name=$release_name" >> "$GITHUB_OUTPUT"
          echo "windows_msi_name=$windows_msi_name" >> "$GITHUB_OUTPUT"
          echo "mac_arm64_dmg_name=$mac_arm64_dmg_name" >> "$GITHUB_OUTPUT"
          echo "mac_x64_dmg_name=$mac_x64_dmg_name" >> "$GITHUB_OUTPUT"

  build-tauri:
    needs: metadata
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-arm64
            runner: macos-15
            rust_target: aarch64-apple-darwin
            tauri_args: --target aarch64-apple-darwin --bundles dmg
            bundle_dir: dmg
            extension: dmg
          - name: macos-x64
            runner: macos-15-intel
            rust_target: x86_64-apple-darwin
            tauri_args: --target x86_64-apple-darwin --bundles dmg
            bundle_dir: dmg
            extension: dmg
          - name: windows-x64
            runner: windows-2022
            rust_target: x86_64-pc-windows-msvc
            tauri_args: --target x86_64-pc-windows-msvc --bundles msi
            bundle_dir: msi
            extension: msi
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install frontend dependencies
        working-directory: tauri
        run: bun install --frozen-lockfile

      - name: Run Tauri tests
        working-directory: tauri/src-tauri
        run: cargo test --locked

      - name: Write release version override
        working-directory: tauri
        shell: bash
        run: |
          printf '{"version":"%s"}\n' '${{ needs.metadata.outputs.app_version }}' > tauri-release-version.json

      - name: Build Tauri installer
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: tauri
          tauriScript: bun run tauri
          args: ${{ matrix.tauri_args }} --config tauri-release-version.json

      - name: Prepare release asset
        shell: bash
        run: |
          bundle_dir="tauri/src-tauri/target/${{ matrix.rust_target }}/release/bundle/${{ matrix.bundle_dir }}"
          case "${{ matrix.name }}" in
            macos-arm64) asset_name="${{ needs.metadata.outputs.mac_arm64_dmg_name }}" ;;
            macos-x64) asset_name="${{ needs.metadata.outputs.mac_x64_dmg_name }}" ;;
            windows-x64) asset_name="${{ needs.metadata.outputs.windows_msi_name }}" ;;
            *) echo "Unknown release matrix item: ${{ matrix.name }}" >&2; exit 1 ;;
          esac

          mkdir -p release
          mapfile -t bundles < <(find "$bundle_dir" -maxdepth 1 -type f -name '*.${{ matrix.extension }}' | sort)

          if [[ "${#bundles[@]}" -ne 1 ]]; then
            echo "Expected exactly one .${{ matrix.extension }} bundle in $bundle_dir, found ${#bundles[@]}" >&2
            printf '%s\n' "${bundles[@]}" >&2
            exit 1
          fi

          cp "${bundles[0]}" "release/$asset_name"
          ls -lh release

      - name: Upload Tauri release asset
        uses: actions/upload-artifact@v4
        with:
          name: tauri-${{ matrix.name }}
          path: release/*.${{ matrix.extension }}
          if-no-files-found: error

  publish-release:
    needs:
      - metadata
      - build-tauri
    runs-on: ubuntu-latest

    steps:
      - name: Download Tauri release assets
        uses: actions/download-artifact@v5
        with:
          pattern: tauri-*
          path: release
          merge-multiple: true

      - name: Verify release assets
        shell: bash
        run: |
          test -f "release/${{ needs.metadata.outputs.windows_msi_name }}"
          test -f "release/${{ needs.metadata.outputs.mac_arm64_dmg_name }}"
          test -f "release/${{ needs.metadata.outputs.mac_x64_dmg_name }}"
          find release -maxdepth 1 -type f -print | sort

      - name: Generate release notes
        shell: bash
        run: |
          cat > release-notes.md <<'EOF'
          ## ${{ needs.metadata.outputs.release_name }}

          Commit: `${{ github.sha }}`
          Branch: `${{ github.ref_name }}`
          GitHub Actions run: `#${{ needs.metadata.outputs.run_number }}`
          Published app version: `${{ needs.metadata.outputs.app_version }}`

          ### Assets
          - `${{ needs.metadata.outputs.windows_msi_name }}` - Tauri Windows x64 MSI. WinFsp must already be installed for mounting to work.
          - `${{ needs.metadata.outputs.mac_arm64_dmg_name }}` - Tauri macOS DMG for Apple Silicon Macs.
          - `${{ needs.metadata.outputs.mac_x64_dmg_name }}` - Tauri macOS DMG for Intel Macs.

          ### macOS security note
          The macOS app is not Developer ID signed or notarized. On first launch, macOS may block it; after trying to open it, go to System Settings > Privacy & Security and choose Open Anyway/Open for Cloud Drive Mount. Only do this if you trust this release.
          EOF

      - name: Upload workflow release bundle
        uses: actions/upload-artifact@v4
        with:
          name: CloudDriveMount-${{ needs.metadata.outputs.app_version }}-${{ needs.metadata.outputs.short_sha }}
          path: |
            release/*.dmg
            release/*.msi
            release-notes.md
          if-no-files-found: error

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.metadata.outputs.tag_name }}
          target_commitish: ${{ github.sha }}
          name: ${{ needs.metadata.outputs.release_name }}
          body_path: release-notes.md
          prerelease: false
          make_latest: true
          fail_on_unmatched_files: true
          files: |
            release/*.dmg
            release/*.msi
